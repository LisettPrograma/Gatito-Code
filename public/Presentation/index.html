<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Gatito Code - Presentación</title>
  <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
  <!-- Escala el contenedor completo (256x192 base pero lo hacemos 768x576) -->
  <div id="presentation-container">
    
    <!-- Slides inyectadas por JS -->
    
    <div id="nav-ui">
      <button class="nav-btn" id="btn-prev">◀ ANT</button>
      <span id="slide-counter">1 / 7</span>
      <button class="nav-btn" id="btn-next">SIG ▶</button>
    </div>

    <!-- Elementos de transición -->
    <div id="transition-curtain">
      <canvas id="transition-canvas"></canvas>
    </div>
  </div>

  <!-- Phaser para la demo interactiva -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Lógica de la app -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
